name: frontend
description: Khulasaa - Anonymous Corruption Reporting Platform for Nepal
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase Services for secure, anonymous cloud datastore
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_storage: ^11.6.8
  
  # State management & Routing
  provider: ^6.1.1
  go_router: ^13.2.0
  
  # Mapping & Geolocation APIs
  google_maps_flutter: ^2.5.3
  google_maps_flutter_web: ^0.5.4+3
  geolocator: ^11.0.0
  
  # Networking
  http: ^1.2.0
  file_picker: ^8.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
